# OV7670 FIFO Camera Demo
CONFIG_GPIO=y
CONFIG_I2C=y

# Serial console (required for any UART output on nRF54L15)
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y

CONFIG_MAIN_STACK_SIZE=4096

# Display
CONFIG_DISPLAY=y
CONFIG_ST7735R=y
CONFIG_MIPI_DBI=y

# C++ support
# https://devzone.nordicsemi.com/f/nordic-q-a/100627/nrfconnect-examples-fail-to-build-with-c-17
CONFIG_CPP=y
# Not including the full C++ library (e.g. no iostream) to save space, since we don't need it
# So - no std::string, std::vector, etc. But we can still use C++ features like classes and templates.
CONFIG_REQUIRES_FULL_LIBCPP=n

CONFIG_STD_CPP17=y